[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  COREPACK_ENABLE_STRICT = "0"
  NPM_FLAGS = "--legacy-peer-deps"
  SECRETS_SCAN_OMIT_PATHS = "lib/microsoft-graph.ts,lib/orders.ts,app/api/auth/signup/route.ts,app/api/auth/test-email/route.ts,lib/supabase/server.ts,lib/supabase/admin.ts"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cache static assets aggressively at the CDN edge
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache optimized images
[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# Cache font files
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
