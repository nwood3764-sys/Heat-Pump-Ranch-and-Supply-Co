name: Sync ACiQ

on:
  schedule:
    # 06:30 UTC nightly = 01:30 CST / 02:30 CDT
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        type: boolean
        default: false
      limit:
        description: "Limit products (e.g. 25 for smoke test)"
        required: false
        type: string
        default: ""
      category:
        description: "Single category filter (e.g. mini-split)"
        required: false
        type: string
        default: ""
      force_login:
        description: "Force fresh login (ignore cached session)"
        required: false
        type: boolean
        default: false

concurrency:
  group: sync-aciq
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: hpr-app-initial/hpr-app/scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install scraper deps
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Restore cached portal session (avoids CAPTCHA solve if still valid)
      - name: Restore cached portal session
        if: inputs.force_login != true
        uses: actions/cache/restore@v4
        with:
          path: hpr-app-initial/hpr-app/scripts/.aciq-session.json
          key: aciq-session-${{ github.run_id }}
          restore-keys: |
            aciq-session-

      - name: Build args
        id: args
        run: |
          ARGS=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            ARGS="$ARGS --dry-run"
          fi
          if [[ -n "${{ inputs.limit }}" ]]; then
            ARGS="$ARGS --limit=${{ inputs.limit }}"
          fi
          if [[ -n "${{ inputs.category }}" ]]; then
            ARGS="$ARGS --category=${{ inputs.category }}"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Run ACiQ sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ACIQ_PORTAL_USERNAME: ${{ secrets.ACIQ_PORTAL_USERNAME }}
          ACIQ_PORTAL_PASSWORD: ${{ secrets.ACIQ_PORTAL_PASSWORD }}
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
        run: node sync-aciq.mjs ${{ steps.args.outputs.args }}

      # Save session for next run (even if sync partially failed,
      # a valid session is still worth caching)
      - name: Cache portal session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: hpr-app-initial/hpr-app/scripts/.aciq-session.json
          key: aciq-session-${{ github.run_id }}
