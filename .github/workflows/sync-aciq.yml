name: Sync ACiQ

on:
  schedule:
    # 06:30 UTC nightly = 01:30 CST / 02:30 CDT
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        type: boolean
        default: false
      limit:
        description: "Limit products (e.g. 25 for smoke test)"
        required: false
        type: string
        default: ""
      category:
        description: "Single category filter (e.g. mini-split)"
        required: false
        type: string
        default: ""

concurrency:
  group: sync-aciq
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: hpr-app-initial/hpr-app/scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install scraper deps
        run: npm install --no-audit --no-fund

      - name: Build args
        id: args
        run: |
          ARGS=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            ARGS="$ARGS --dry-run"
          fi
          if [[ -n "${{ inputs.limit }}" ]]; then
            ARGS="$ARGS --limit=${{ inputs.limit }}"
          fi
          if [[ -n "${{ inputs.category }}" ]]; then
            ARGS="$ARGS --category=${{ inputs.category }}"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Run ACiQ sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Optional â when set, scraper layers wholesale pricing
          # from portal.aciq.com on top of HVACDirect retail data
          ACIQ_PORTAL_USERNAME: ${{ secrets.ACIQ_PORTAL_USERNAME }}
          ACIQ_PORTAL_PASSWORD: ${{ secrets.ACIQ_PORTAL_PASSWORD }}
        run: node sync-aciq.mjs ${{ steps.args.outputs.args }}
